<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTable Generator - Minimal & Iconized</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette from Image */
            --color-primary: #52e5ff;    /* Cyan */
            --color-secondary: #b1fffd;  /* Mint */
            --color-light: #f4fdfc;      /* White-ish */
            --color-accent: #ffb1bc;     /* Soft Pink */
            --color-bg: #a68a8e;         /* Muted Mauve */
            
            --text-dark: #2d2d2d;
            --text-light: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--color-light);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0,0,0,0.15);
        }

        nav {
            background: var(--color-primary);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hero {
            padding: 50px 40px;
            text-align: left;
            background: var(--color-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .hero h1 { font-size: 2rem; margin-bottom: 8px; }
        .hero p { color: #555; font-size: 0.95rem; }

        .form-panel { padding: 40px; }

        .form-section {
            margin-bottom: 40px;
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: var(--color-bg);
        }

        .section-head h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
        }

        input, select {
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--color-primary); }

        .dynamic-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        .btn-add {
            background: #fff;
            border: 1.5px dashed var(--color-bg);
            color: var(--color-bg);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-remove {
            background: var(--color-accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: var(--color-primary);
            color: var(--text-dark);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-options { display: flex; gap: 15px; }
        .toggle-card {
            flex: 1;
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-card.selected {
            border-color: var(--color-primary);
            background: var(--color-secondary);
        }

        .toggle-card input { display: none; }

        footer { text-align: center; padding: 30px; color: var(--text-light); font-size: 0.75rem; opacity: 0.8; }

        svg { flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <div class="nav-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                TimeTable AI
            </div>
        </nav>

        <section class="hero">
            <h1>Create Your Schedule</h1>
            <p>Enter your institutional data to generate an optimized, conflict-free timetable.</p>
        </section>

        <div class="form-panel">
            <form action="generate.php" method="POST">
                
                <div class="form-section">
                    <div class="section-head">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        <h2>Institution</h2>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>School Name</label>
                        <input type="text" name="school_name" placeholder="e.g. Westside Academy" required>
                    </div>
                    <div class="grid">
                        <div class="form-group"><label>Start</label><input type="time" name="school_start" value="08:00"></div>
                        <div class="form-group"><label>End</label><input type="time" name="school_end" value="15:00"></div>
                        <div class="form-group"><label>Period (min)</label><input type="number" name="period_duration" value="45"></div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-head">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <h2>Classes</h2>
                    </div>
                    <div id="classList">
                        <div class="dynamic-row">
                            <div class="form-group" style="flex:1;"><label>Class ID</label><input type="text" name="classes[]" placeholder="10-B"></div>
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addRow('classList')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Class
                    </button>
                </div>

                <div class="form-section">
                    <div class="section-head">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        <h2>Subjects</h2>
                    </div>
                    <div id="subjectList">
                        <div class="dynamic-row">
                            <div class="form-group" style="flex:1;"><label>Subject</label><input type="text" name="subjects[]" placeholder="Physics"></div>
                            <div class="form-group" style="flex:1;"><label>Teacher</label><input type="text" name="teachers[]" placeholder="Dr. Ray"></div>
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addSubjectRow()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Subject
                    </button>
                </div>

                <button type="submit" class="btn-submit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Generate Timetable
                </button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 TimeTable AI — Minimal Neural Engine
    </footer>

    <script>
        function addRow(id) {
            const container = document.getElementById(id);
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `<div class="form-group" style="flex:1;"><label>Class ID</label><input type="text" name="classes[]" required></div>
                             <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
            container.appendChild(row);
        }

        function addSubjectRow() {
            const container = document.getElementById('subjectList');
            const row = document.createElement('div');
            row.className = 'dynamic-row';
            row.innerHTML = `<div class="form-group" style="flex:1;"><label>Subject</label><input type="text" name="subjects[]" required></div>
                             <div class="form-group" style="flex:1;"><label>Teacher</label><input type="text" name="teachers[]" required></div>
                             <button type="button" class="btn-remove" onclick="this.parentElement.remove()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
            container.appendChild(row);
        }
    </script>
</body>
</html>
